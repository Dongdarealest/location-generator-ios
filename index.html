<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Location Generator iOS</title>
    
    <link rel="stylesheet" href="css/style.css?v=1.2">
    <link rel="stylesheet" href="css/terminal.css?v=1.2">

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
</head>

<body>

    <div class="container">

        <h1>Location Generator iOS</h1>

        <div class="input-area">
            <input
                id="locationInput"
                type="text"
                placeholder="Enter location, coordinates, Google Maps or Apple Maps URL">

            <button id="generateButton">
                Generate

        <div id="map"></div>

        <h2>Generated Module</h2>
        
        <button id="downloadModuleButton" style="margin-bottom: 15px; padding: 12px 15px; background: #238636; color: white; border: none; border-radius: 6px; font-weight: bold; width: 100%; font-size: 14px; cursor: pointer;">
            📥 Download ios-location-spoofer.sgmodule
        </button>

        <pre id="generatedFile"></pre>

    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script src="js/config.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/terminal.js"></script>
    <script src="js/geocoder.js"></script>
    <script src="js/template.js"></script>
    <script src="js/map.js"></script>
    <script src="js/app.js"></script>

</body>
</html>
